<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <h1>Random Task Picker</h1>
        <p class ="subtitle">It's hard to pick a task! let us help with that.</p>

        <div class ="input-area">
            <input type="text" id="taskInput" placeholder="Enter a task">
            <button id="addTask">Add Task</button>
            <button id="clearTasks">Clear Tasks</button>
        </div>

        <ul id="taskList">

        </ul>
         
        <button id="spinBtn">Pick a Random Task</button>

        <div id="resultBox" class ="hidden">
            <p class="result-title">Time to focus on: </p>
            <h2 id="winner"></h2>

            <button id="goToFocusTimer" class="hidden">Start this task</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
