<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
     <div class="navigation1">
        <a class="nav-link1" href="../prototype_1/index.html">Focus Timer</a>
     </div>
     <div class="navigation2">
        <a class="nav-link2" href="../prototype_3/index.html">Task Manager</a>
     </div>

    <div class="card">
        <h1>Random Task Picker</h1>
        <p class ="subtitle">It's hard to pick a task! let us help with that.</p>

        <div class ="input-area">
            <div style="margin-bottom: 10px; display: flex; gap: 5px; justify-content: center;">
                <button onclick="loadTemplate('exam')" style="font-size: 0.8rem; padding: 5px;">📚 Exam Prep</button>
                <button onclick="loadTemplate('admin')" style="font-size: 0.8rem; padding: 5px;">✉️ Admin/Emails</button>
            </div>

            <!-- <input  type="number" id="timeInput" placeholder="Mins (e.g. 15" style="width: 80px;"> -->
            <input type="text" id="taskInput" placeholder="Enter a task">
            <button id="addTask">Add Task</button>
            <button id ="clearTasksBtn">Clear Tasks</button>
        </div>

        <ul id="taskList">

        </ul>

        <button id="clearTasksBtn" class="hidden">Clear Tasks</button>
         
        <button id="spinBtn">Pick a Random Task</button>

        <div id="resultBox" class ="hidden">
            <p class="result-title">Time to focus on: </p>
            <h2 id="winner"></h2>

            <button id="goToFocusTimer" class="hidden">Start this task</button>
        </div>
    </div>
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
