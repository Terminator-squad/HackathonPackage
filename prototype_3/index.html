<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Smart Agenda</title>
     <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card" id="setupScreen">
        <h1>Schedule A Session</h1>
        <p class="subtitle">Set a time and an agenda. We will notify you when it's time to study.</p>

        <input type="text" id="subjectInput" placeholder="Subject (e.g. Math, Computer Science, etc.)">
        <textarea id="agendaInput" rows="3" placeholder="Agenda (e.g. Read chapter 5, solve exercises, etc.)"></textarea>

        <input type="time" id="timeInput">

        <!-- Theme switching is handled by applyTheme() and loadTheme() functions in app.js -->
        <div class="theme-settings">
            <label for="themeSelect">Theme:</label>
            <select id="themeSelect">
                <option value="dark">Dark Mode</option>
                <option value="light">Light Mode</option>
            </select>
        </div>

        <button id="setAlarmBtn">Set Alarm</button>
        <p id="statusMessage" class="hidden status">Waiting for time...</p>
    </div>

    <div id="alarmScreen" class="hidden fullscreen-modal">
        <h1 class="bounce">Time to Study!</h1>
        <h2 id="displaySubject">Subject</h2>

        <div class="agenda-box">
            <h3>Today's Agenda:</h3>
            <p id="displayAgenda">Agenda details will appear here.</p>
        </div>
        <!-- Snooze functionality is handled by the snooze() function in app.js -->
        <div class="snooze-options">
            <label for="snoozeDuration">Snooze for:</label>
            <select id="snoozeDuration">
                <option value="5">5 minutes</option>
                <option value="10" selected>10 minutes</option>
                <option value="15">15 minutes</option>
                <option value="20">20 minutes</option>
                <option value="25">25 minutes</option>
                <option value="30">30 minutes</option>
            </select>
        </div>
        <button id="snoozeBtn">Snooze</button>
        <button id="goToTimerBtn" class="hidden">Start Focus Timer</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
