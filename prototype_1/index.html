<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <a href="../prototype_2/index.html" class="back-link">Back to Task Picker</a>

        <h1>Focus Timer</h1>

        <h2 id="currentTaskDisplay" class="task-highlight">Loading task ...</h2>

        <p id="message">Stay focused if you leave you will have to start over.</p>
        
        <div id="display">
            <span id="minutes">25</span>:<span id="seconds">00</span>
        </div>

        <div class="buttons">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
